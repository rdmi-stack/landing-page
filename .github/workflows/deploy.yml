name: CI

# Validation only. The live ads domain ai.rdmi.in resolves to rdmi-landing.netlify.app,
# while this checkout is linked to rdmi-landing-page.netlify.app; the current
# NETLIFY_SITE_ID/NETLIFY_AUTH_TOKEN pair returns Forbidden for production deploys.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
